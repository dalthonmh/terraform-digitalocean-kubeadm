---
# roles/kubernetes/tasks/main.yml
#
# The task files are numbered because the order matters: containerd has to be
# running before kubeadm starts a kubelet, and the SSH trust has to be in place
# before the master reaches the workers to join them. Keep the numbers in sync
# with the import order below.

# 01: System prerequisites (swap, kernel modules, sysctl, apt dependencies)
- name: Install system prerequisites
  import_tasks: 01_system_prerequisites.yml
  tags:
    - prereqs

# 02: Container runtime (containerd, runc, CNI plugins)
- name: Install and configure the container runtime
  import_tasks: 02_container_runtime.yml
  tags:
    - containerd
    - runtime

# 03: Kubernetes packages (kubeadm, kubelet, kubectl)
- name: Install the Kubernetes packages
  import_tasks: 03_kubernetes_packages.yml
  tags:
    - k8s
    - kube-tools

# 04: Shell environment (kubectl aliases, completion, vim settings).
# Unrelated to files/post-install.sh despite the old "post_installation" name.
- name: Configure the shell environment
  import_tasks: 04_shell_environment.yml
  tags:
    - shell
    - post

# 05: Passwordless SSH from the master node to the workers
- name: Set up SSH trust between master and workers
  import_tasks: 05_ssh_trust.yml
  tags:
    - ssh
    - ssh-trust

# 06: Ship the scripts and the inventory to the master node
- name: Copy the master node files
  import_tasks: 06_master_files.yml
  when: inventory_hostname in groups['master']
  tags:
    - copy-master

# 07: Initialize the cluster and join the workers (runs files/post-install.sh)
- name: Bootstrap the Kubernetes cluster from the master node
  import_tasks: 07_cluster_bootstrap.yml
  when: inventory_hostname in groups['master']
  tags:
    - bootstrap
    - post-install
