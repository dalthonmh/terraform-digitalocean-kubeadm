---
# tasks file: roles/kubernetes/tasks/06_master_files.yml
#
# Ships files/*.sh and the Ansible inventory to /root on the master node, where
# 07_cluster_bootstrap.yml runs them.

# Step 1. Copy bash scripts to the master node
- name: Copy bash scripts to the master node with execution permissions
  copy:
    src: "{{ item }}"
    dest: /root/
    owner: root
    group: root
    mode: "0755"
  with_fileglob:
    - "{{ role_path }}/files/*"
  become: true

# Step 2. Copy hosts.ini to the master node
- name: Copy Ansible inventory (hosts.ini) to the master node
  copy:
    src: "{{ playbook_dir }}/hosts.ini"
    dest: /root/hosts.ini
    owner: root
    group: root
    mode: "0644"
  become: true
